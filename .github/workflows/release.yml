name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Package ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows
            runner: windows-latest
            build-script: build:win
            artifact-name: windows
            artifact-path: |
              dist/*.exe
              dist/*.exe.blockmap
              dist/latest.yml
          - name: macOS
            runner: macos-latest
            build-script: build:mac
            artifact-name: macos
            artifact-path: |
              dist/*.dmg
              dist/*.zip
              dist/*.blockmap
              dist/latest-mac.yml
          - name: Linux
            runner: ubuntu-latest
            build-script: build:linux
            artifact-name: linux
            artifact-path: |
              dist/*.AppImage
              dist/*.deb
              dist/latest-linux.yml

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint:check

      - name: Typecheck
        run: npm run typecheck

      - name: Package installer
        run: npm run ${{ matrix.platform.build-script }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: timer-overlay-${{ matrix.platform.artifact-name }}
          path: ${{ matrix.platform.artifact-path }}
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: package
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Resolve release metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          short_sha="${GITHUB_SHA::7}"
          tag="v${version}-${short_sha}"
          {
            echo "version=${version}"
            echo "short_sha=${short_sha}"
            echo "tag=${tag}"
            echo "name=Timer Overlay ${version} (${short_sha})"
          } >> "$GITHUB_OUTPUT"

      - name: Download packaged artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List release artifacts
        shell: bash
        run: |
          set -euo pipefail
          find release-artifacts -maxdepth 1 -type f -printf '%f\n' | sort

      - name: Create release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: ${{ steps.metadata.outputs.tag }}
          name: ${{ steps.metadata.outputs.name }}
          target_commitish: ${{ github.sha }}
          make_latest: true
          fail_on_unmatched_files: true
          generate_release_notes: true
          body: |
            Automated desktop release for `${{ github.sha }}`.

            Built installers for Windows, macOS, and Linux after changes landed on `main`.

            macOS builds are unsigned and not notarized, so Gatekeeper may warn on first launch.
          files: |
            release-artifacts/*
