name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: Verify release source
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint:check

      - name: Typecheck
        run: npm run typecheck

  package:
    name: Package ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    needs: ci
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows
            runner: windows-latest
            electron-builder-target: win
            artifact-name: windows
            artifact-path: |
              dist/*.exe
              dist/*.exe.blockmap
              dist/latest.yml
          - name: macOS
            runner: macos-latest
            electron-builder-target: mac
            artifact-name: macos
            artifact-path: |
              dist/*.dmg
              dist/*.zip
              dist/*.blockmap
              dist/latest-mac.yml
          - name: Linux
            runner: ubuntu-latest
            electron-builder-target: linux
            artifact-name: linux
            artifact-path: |
              dist/*.AppImage
              dist/*.deb
              dist/latest-linux.yml

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npx electron-vite build

      - name: Package installer
        run: npx electron-builder --${{ matrix.platform.electron-builder-target }} --publish never

      - name: Upload installer artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: tomato-timer-${{ matrix.platform.artifact-name }}
          path: ${{ matrix.platform.artifact-path }}
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: package
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Resolve release metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          short_sha="${GITHUB_SHA::7}"
          tag="v${version}-${short_sha}"
          {
            echo "version=${version}"
            echo "short_sha=${short_sha}"
            echo "tag=${tag}"
            echo "name=Tomato Timer ${version} (${short_sha})"
          } >> "$GITHUB_OUTPUT"

      - name: Download packaged artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List release artifacts
        shell: bash
        run: |
          set -euo pipefail
          find release-artifacts -maxdepth 1 -type f -printf '%f\n' | sort

      - name: Create release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.metadata.outputs.tag }}
          RELEASE_NAME: ${{ steps.metadata.outputs.name }}
        run: |
          set -euo pipefail
          mapfile -t files < <(find release-artifacts -maxdepth 1 -type f | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release artifacts found" >&2
            exit 1
          fi

          gh release create "$RELEASE_TAG" "${files[@]}" \
            --title "$RELEASE_NAME" \
            --target "$GITHUB_SHA" \
            --latest \
            --generate-notes \
            --notes "Automated desktop release for \`$GITHUB_SHA\`.

          Built installers for Windows, macOS, and Linux after changes landed on \`main\`.

          macOS builds are unsigned and not notarized, so Gatekeeper may warn on first launch."
